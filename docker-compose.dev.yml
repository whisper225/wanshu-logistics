# 可选：本地开发依赖（MySQL 等若已自备可只起 mongo + rabbitmq）
services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - wanshu_mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  wanshu_mongo_data:
