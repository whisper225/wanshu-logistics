server:
  port: 8080

spring:
  application:
    name: wanshu-logistics
  profiles:
    active: dev,local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wanshu_logistics?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
    mongodb:
      uri: mongodb://localhost:27017/wanshu_logistics
    neo4j:
      uri: bolt://localhost:7687
      authentication:
        username: ${NEO4J_USERNAME:neo4j}
        password: ${NEO4J_PASSWORD:neo4j}

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: 3600
  is-concurrent: true
  token-style: uuid

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.wanshu: debug

# 阿里云 OSS
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: wanshu-logistics
    url-prefix: https://wanshu-logistics.oss-cn-beijing.aliyuncs.com

# Coze AI
coze:
  api-base-url: https://api.coze.cn
  access-token: ${COZE_ACCESS_TOKEN:}
  customer-bot-id: ${COZE_CUSTOMER_BOT_ID:}
  dispatch-bot-id: ${COZE_DISPATCH_BOT_ID:}
  timeout: 60
