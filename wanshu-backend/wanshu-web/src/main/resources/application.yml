server:
  port: 8080

spring:
  application:
    name: wanshu-logistics
  profiles:
    active: dev,local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wanshu_logistics?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD:}
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/wanshu_logistics}

  # Spring Boot 3 须用 spring.neo4j（勿写 spring.data.neo4j）
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:}

  rabbitmq:
    host: localhost
    port: 5672
    # 本地默认 guest/guest；生产请用环境变量覆盖
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    # 连接超时（ms）
    connection-timeout: 5000
    # 断线自动恢复
    listener:
      simple:
        # 队列不存在时不直接报致命错误，等待 Broker 恢复后重建
        missing-queues-fatal: false
        # 消费者数量
        concurrency: 1
        max-concurrency: 5
        # 消费失败后的重试策略
        retry:
          enabled: true
          initial-interval: 3000   # 首次重试等待 3 秒
          max-attempts: 3          # 最多重试 3 次
          multiplier: 2.0          # 每次等待时间翻倍（3s → 6s → 12s）
          max-interval: 30000      # 最长等待 30 秒
    # TCP 连接断开后自动重连
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  is-read-header: true
  timeout: 86400
  active-timeout: 3600
  is-concurrent: true
  token-style: uuid

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.wanshu: debug

# 微信小程序（app-secret 仅允许来自环境变量或本地 application-local.yml，勿在此文件写明文）
wanshu:
  wx:
    app-id: ${WX_APP_ID:wx77f718439c6f37e4}
    app-secret: ${WX_APP_SECRET:}
  auth:
    wx-mock-user-id: 0
  open:
    api-key: ${WANSHU_OPEN_API_KEY:}

amap:
  rest:
    key: ${AMAP_REST_KEY:}

aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: wanshu-logistics
    url-prefix: https://wanshu-logistics.oss-cn-beijing.aliyuncs.com

# Coze：生产用环境变量；本地明文可写在 application-local.yml（该文件已 gitignore）
coze:
  api-base-url: https://api.coze.cn
  access-token: ${COZE_ACCESS_TOKEN:}
  customer-bot-id: ${COZE_CUSTOMER_BOT_ID:}
  dispatch-bot-id: ${COZE_DISPATCH_BOT_ID:}
  route-workflow-id: ${COZE_ROUTE_WORKFLOW_ID:}
  timeout: 60
