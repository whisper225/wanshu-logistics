server:
  port: 8080

spring:
  application:
    name: wanshu-logistics
  profiles:
    active: dev,local

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wanshu_logistics?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD:root}
    mongodb:
      uri: mongodb://localhost:27017/wanshu_logistics

  # Spring Boot 3 须用 spring.neo4j（勿写 spring.data.neo4j）
  # 认证失败 AuthenticationException / unauthorized：密码须与 Neo4j 一致（首次登录后改的密码≠默认 neo4j）
  # 建议用环境变量：NEO4J_USERNAME、NEO4J_PASSWORD（与 Neo4j Browser 能登录的账号相同）
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j}

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  is-read-header: true
  timeout: 86400
  active-timeout: 3600
  is-concurrent: true
  token-style: uuid

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.wanshu: debug

# 微信小程序
wanshu:
  wx:
    app-id: wx77f718439c6f37e4
    app-secret: ${WX_APP_SECRET:7278ca5936c0a26f1b59f1a1f59efba3}
  auth:
    # 小程序模拟登录：设为存在的 sys_user.id；0 表示关闭，使用真实 wx.code2session
    # 开发时若未执行 migration_sys_user_wx_openid.sql，可将此值设为已有用户的 id（如 1）临时绕过
    wx-mock-user-id: 0

# 高德地图 Web 服务（后端 REST API）
# 需在高德控制台创建「Web服务」类型 Key，与前端 JS Key 不同
# 用环境变量 AMAP_REST_KEY 注入，避免明文提交；本地可在 application-local.yml 中覆盖
amap:
  rest:
    key: ${AMAP_REST_KEY:}

# 阿里云 OSS
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: wanshu-logistics
    url-prefix: https://wanshu-logistics.oss-cn-beijing.aliyuncs.com

# Coze AI
coze:
  api-base-url: https://api.coze.cn
  access-token: ${COZE_ACCESS_TOKEN:}
  customer-bot-id: ${COZE_CUSTOMER_BOT_ID:}
  dispatch-bot-id: ${COZE_DISPATCH_BOT_ID:}
  timeout: 60
